---
- name: Install Docker dependencies
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present

- name: Add Docker GPG key
  shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Add Docker repository
  shell: |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
    https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" \
    > /etc/apt/sources.list.d/docker.list
  args:
    creates: /etc/apt/sources.list.d/docker.list

- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    update_cache: true
    state: present

- name: Start and enable Docker
  systemd:
    name: docker
    state: started
    enabled: true

- name: Add ubuntu user to docker group
  user:
    name: ubuntu
    groups: docker
    append: true

- name: Clone crAPI repository
  git:
    repo: https://github.com/OWASP/crAPI.git
    dest: /opt/crapi
    version: main
    depth: 1
  become_user: ubuntu

- name: Deploy crAPI with Docker Compose
  shell: docker compose -f /opt/crapi/deploy/docker/docker-compose.yml up -d
  args:
    chdir: /opt/crapi/deploy/docker
  environment:
    DOCKER_BUILDKIT: "1"

- name: Wait for crAPI to be ready
  uri:
    url: http://localhost:8888
    status_code: 200
    timeout: 10
  register: result
  until: result.status == 200
  retries: 30
  delay: 10
