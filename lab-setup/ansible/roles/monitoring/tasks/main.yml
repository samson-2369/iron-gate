---
- name: Install Docker dependencies
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present

- name: Add Docker GPG key
  shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Add Docker repository
  shell: |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
    https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" \
    > /etc/apt/sources.list.d/docker.list
  args:
    creates: /etc/apt/sources.list.d/docker.list

- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    update_cache: true
    state: present

- name: Start and enable Docker
  systemd:
    name: docker
    state: started
    enabled: true

- name: Create monitoring stack directory
  file:
    path: /opt/monitoring
    state: directory
    owner: ubuntu
    group: ubuntu

- name: Write monitoring docker-compose
  copy:
    dest: /opt/monitoring/docker-compose.yml
    content: |
      version: "3.8"

      networks:
        monitoring:
          driver: bridge

      volumes:
        grafana-data:
        loki-data:

      services:
        loki:
          image: grafana/loki:2.9.0
          container_name: loki
          restart: unless-stopped
          ports:
            - "3100:3100"
          volumes:
            - loki-data:/loki
            - ./loki-config.yml:/etc/loki/local-config.yaml
          command: -config.file=/etc/loki/local-config.yaml
          networks:
            - monitoring

        grafana:
          image: grafana/grafana:10.2.0
          container_name: grafana
          restart: unless-stopped
          ports:
            - "3000:3000"
          environment:
            - GF_SECURITY_ADMIN_PASSWORD=changeme
            - GF_USERS_ALLOW_SIGN_UP=false
            - GF_AUTH_ANONYMOUS_ENABLED=false
          volumes:
            - grafana-data:/var/lib/grafana
            - ./grafana/provisioning:/etc/grafana/provisioning
          depends_on:
            - loki
          networks:
            - monitoring

- name: Write Loki config
  copy:
    dest: /opt/monitoring/loki-config.yml
    content: |
      auth_enabled: false

      server:
        http_listen_port: 3100
        grpc_listen_port: 9096

      common:
        instance_addr: 127.0.0.1
        path_prefix: /loki
        storage:
          filesystem:
            chunks_directory: /loki/chunks
            rules_directory: /loki/rules
        replication_factor: 1
        ring:
          kvstore:
            store: inmemory

      query_range:
        results_cache:
          cache:
            embedded_cache:
              enabled: true
              max_size_mb: 100

      schema_config:
        configs:
          - from: 2020-10-24
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h

      ruler:
        alertmanager_url: http://localhost:9093
        storage:
          type: local
          local:
            directory: /loki/rules
        rule_path: /loki/rules-temp
        enable_api: true

      analytics:
        reporting_enabled: false

- name: Create Grafana provisioning directories
  file:
    path: "/opt/monitoring/grafana/provisioning/{{ item }}"
    state: directory
  loop:
    - datasources
    - dashboards

- name: Write Grafana datasource provisioning
  copy:
    dest: /opt/monitoring/grafana/provisioning/datasources/loki.yml
    content: |
      apiVersion: 1
      datasources:
        - name: Loki
          type: loki
          access: proxy
          url: http://loki:3100
          isDefault: true

- name: Deploy monitoring stack
  shell: docker compose up -d
  args:
    chdir: /opt/monitoring

- name: Wait for Grafana
  uri:
    url: http://localhost:3000/api/health
    status_code: 200
    timeout: 10
  register: result
  until: result.status == 200
  retries: 30
  delay: 5
