---
- name: Install Docker dependencies
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present

- name: Add Docker GPG key
  shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Add Docker repository
  shell: |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
    https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" \
    > /etc/apt/sources.list.d/docker.list
  args:
    creates: /etc/apt/sources.list.d/docker.list

- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    update_cache: true
    state: present

- name: Start and enable Docker
  systemd:
    name: docker
    state: started
    enabled: true

- name: Create Conpot config directory
  file:
    path: /opt/conpot
    state: directory
    owner: ubuntu
    group: ubuntu

- name: Write Conpot docker-compose
  copy:
    dest: /opt/conpot/docker-compose.yml
    content: |
      version: "3.8"
      services:
        conpot:
          image: honeynet/conpot:latest
          container_name: conpot
          restart: unless-stopped
          network_mode: host
          privileged: true
          volumes:
            - ./conpot-logs:/var/log/conpot
          command: --template default

- name: Create Conpot log directory
  file:
    path: /opt/conpot/conpot-logs
    state: directory
    mode: '0777'

- name: Deploy Conpot
  shell: docker compose up -d
  args:
    chdir: /opt/conpot

- name: Wait for Modbus port
  wait_for:
    port: 502
    host: 127.0.0.1
    timeout: 60
    delay: 5
