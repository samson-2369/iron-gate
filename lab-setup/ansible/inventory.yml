all:
  vars:
    ansible_ssh_private_key_file: ~/.ssh/iron_gate
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"

  children:
    api:
      hosts:
        iron-gate-api:
          ansible_host: 10.0.0.100
          ansible_user: ubuntu

    attacker:
      hosts:
        iron-gate-attacker:
          ansible_host: 10.0.0.101
          ansible_user: kali

    monitoring:
      hosts:
        iron-gate-monitor:
          ansible_host: 10.0.0.102
          ansible_user: ubuntu

    ot:
      hosts:
        iron-gate-ot:
          ansible_host: 10.0.0.103
          ansible_user: ubuntu

    lab:
      children:
        api:
        attacker:
        monitoring:
        ot:
